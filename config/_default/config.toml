# Change baseurl before deploy
baseurl = "https://ines2r.github.io/"
languageCode = "en-us"
title = "Inès de Rosnay"

[params]
  favicon = "favicon.ico"
  description = "Inès de Rosnay’s technical notebook: Hands-on AI and Graph Theory experiments hosted on GitHub. Focused on reproducible research and efficient computing."
  customStyle = "scss/custom.scss"

# Theme i18n support
# Available values: en, fr, id, ja, ko, pt-br, zh-cn, zh-tw, es, de, nl, it, th, el, uk, ar
defaultContentLanguage = "en"

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage = false

# Change it to your Disqus shortname before using
# disqusShortname = ""

[pagination]
pagerSize = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[minify]
  disableXML = true